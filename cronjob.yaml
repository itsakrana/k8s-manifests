apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup-cron        # CronJob name
  namespace: devops

spec:
  schedule: "0 2 * * *"       # Run daily at 2 AM  (minute → hour → day → month → week)

  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: busybox

            command: ["/bin/sh", "-c"]
            args:
            - echo "Starting backup..." && sleep 5 && echo "Backup completed"

          restartPolicy: OnFailure
