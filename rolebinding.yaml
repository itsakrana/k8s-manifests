apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rolebinding        # RoleBinding name
  namespace: devops            # Namespace

subjects:
- kind: ServiceAccount
  name: app-sa                 # ServiceAccount (who gets permission)
  namespace: devops

roleRef:
  kind: Role
  name: app-role               # Role (what permission)
  apiGroup: rbac.authorization.k8s.io
